<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMRig WASM Miner</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149;
  --text: #c9d1d9; --muted: #6e7681;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
  background: var(--bg); color: var(--text);
  height: 100vh; display: grid;
  grid-template-rows: 48px 1fr;
  grid-template-columns: 240px 1fr;
  grid-template-areas: "nav nav" "side main";
  overflow: hidden;
}
nav {
  grid-area: nav; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
.logo { font-weight: 700; font-size: 15px; letter-spacing: .5px; }
.logo span { color: var(--accent); }
.pill {
  font-size: 11px; padding: 2px 8px; border-radius: 12px;
  font-weight: 600; letter-spacing: .3px;
}
.pill.idle { background: #21262d; color: var(--muted); }
.pill.running { background: #0d4429; color: var(--green); }
.pill.error { background: #490202; color: var(--red); }

aside {
  grid-area: side; background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px;
}
.field { display: flex; flex-direction: column; }
.field label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.field input, .field select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 6px 8px; font-size: 13px;
}
.btn {
  padding: 8px 12px; border: none; border-radius: 6px; font-weight: 600;
  cursor: pointer; font-size: 13px;
}
.btn.primary { background: var(--accent); color: #000; }
.btn.danger { background: var(--red); color: #fff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

main {
  grid-area: main; padding: 14px; display: flex; flex-direction: column; gap: 12px;
}
.stats-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
}
.stat-card .label { font-size: 10px; color: var(--muted); }
.stat-card .value { font-size: 22px; font-weight: 700; font-family: monospace; color: var(--accent); }

.chart-panel, .log-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
  flex: 1; display: flex; flex-direction: column;
}
canvas { flex: 1; }
.log-body {
  flex: 1; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.5;
}
</style>
</head>
<body>

<nav>
  <div class="logo">XMRig <span>WASM</span></div>
  <div class="pill idle" id="statusPill">Idle</div>
  <div class="spacer" style="flex:1"></div>
  <div id="uptimeLabel" style="font-size:12px;color:var(--muted)">—</div>
</nav>

<aside>
  <div class="field">
    <label>Pool Host</label>
    <input id="poolHost" value="pool.supportxmr.com">
  </div>
  <div class="field">
    <label>Port</label>
    <input id="poolPort" value="3333" type="number">
  </div>
  <div class="field">
    <label>Wallet</label>
    <input id="wallet" placeholder="Your XMR address">
  </div>

  <div class="field">
    <label>Algorithm</label>
    <select id="algo">
      <option value="rx/0">RandomX (rx/0)</option>
      <option value="cn/1">CryptoNight</option>
      <option value="cn-lite/1">CN-Lite</option>
    </select>
  </div>

  <div class="field">
    <label>Threads</label>
    <input id="threads" type="number" value="2" min="1" max="8">
  </div>

  <label style="font-size:11px;margin:8px 0 4px">
    <input type="checkbox" id="lightMode" checked> Light Mode (fast start, recommended)
  </label>

  <button class="btn primary" id="startBtn">▶ Start Mining</button>
  <button class="btn danger" id="stopBtn" disabled>■ Stop</button>
</aside>

<main>
  <div class="stats-row">
    <div class="stat-card"><div class="label">Hashrate</div><div class="value" id="hashrate">0.00</div><div>H/s</div></div>
    <div class="stat-card"><div class="label">Accepted</div><div class="value" id="accepted">0</div></div>
    <div class="stat-card"><div class="label">Rejected</div><div class="value" id="rejected" style="color:var(--red)">0</div></div>
    <div class="stat-card"><div class="label">Total</div><div class="value" id="total">0</div><div id="totalUnit">H</div></div>
  </div>

  <div class="chart-panel">
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Hashrate (last 5 min)</div>
    <canvas id="chart"></canvas>
  </div>

  <div class="log-panel">
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Log</div>
    <div class="log-body" id="logBody"></div>
  </div>
</main>

<script>
// ==================== CONFIG & STATE ====================
let wasmModule = null;
let isMining = false;
let startTime = 0;
let totalHashes = 0;
let accepted = 0;
let rejected = 0;
let rateHistory = [];
const MAX_HISTORY = 300;

// ==================== LOGGING ====================
function log(msg, type = 'info') {
  const body = document.getElementById('logBody');
  const entry = document.createElement('div');
  const ts = new Date().toLocaleTimeString('en-US', {hour12:false});
  entry.style.color = type === 'success' ? '#3fb950' : type === 'error' ? '#f85149' : '#c9d1d9';
  entry.textContent = `[${ts}] ${msg}`;
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}

// ==================== CHART ====================
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
new ResizeObserver(resize).observe(canvas);
resize();

// ==================== WASM LOADING ====================
async function loadWasm() {
  log('Loading XMRig WASM...', 'info');
  const paths = ['./xmrig.js', '../build_wasm/xmrig.js'];
  
  for (const path of paths) {
    try {
      const res = await fetch(path, {method:'HEAD'});
      if (res.ok) {
        log(`Found module at ${path}`, 'success');
        const script = document.createElement('script');
        script.src = path;
        script.onload = () => initModule();
        document.head.appendChild(script);
        return;
      }
    } catch(e) {}
  }
  log('WASM not found — running in demo mode', 'error');
  document.getElementById('startBtn').disabled = false;
}

function initModule() {
  const factory = typeof createXMRig !== 'undefined' ? createXMRig : (typeof Module !== 'undefined' ? () => Module : null);
  
  if (factory) {
    factory().then(mod => {
      wasmModule = mod;
      log('WASM runtime ready ✓', 'success');
      document.getElementById('startBtn').disabled = false;
    }).catch(err => {
      log(`Module init failed: ${err.message}`, 'error');
    });
  }
}

// ==================== MINING CONTROL ====================
let simInterval = null;

function startMining() {
  if (isMining) return;
  isMining = true;
  startTime = Date.now();
  totalHashes = accepted = rejected = 0;
  rateHistory = [];

  const algo = document.getElementById('algo').value;
  const threads = parseInt(document.getElementById('threads').value) || 1;
  const light = document.getElementById('lightMode').checked;

  log(`Starting ${algo} | Threads: ${threads} | Light mode: ${light}`, 'success');
  document.getElementById('statusPill').className = 'pill running';
  document.getElementById('statusPill').textContent = 'Running';
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  // Real WASM path (when you export the mining functions)
  if (wasmModule && typeof wasmModule.startMining === 'function') {
    // TODO: Call your exported C++ functions here
    log('Real WASM mining started (bindings active)', 'success');
  } else {
    log('Demo mode — simulated mining', 'info');
    simulateMining(algo, threads, light);
  }
}

function stopMining() {
  isMining = false;
  clearInterval(simInterval);
  document.getElementById('statusPill').className = 'pill idle';
  document.getElementById('statusPill').textContent = 'Idle';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  log('Mining stopped', 'info');
}

function simulateMining(algo, threads, light) {
  const baseRate = algo.includes('rx') ? (light ? 60 : 45) : algo.includes('lite') ? 900 : 280;
  const rate = Math.floor(baseRate * threads * (light ? 1.3 : 1));

  simInterval = setInterval(() => {
    if (!isMining) return;
    const increment = rate * 0.2 + Math.random() * rate * 0.1;
    totalHashes += increment;

    if (Math.random() < 0.003) accepted++;

    // Update UI
    const elapsed = (Date.now() - startTime) / 1000;
    const currentRate = elapsed > 0 ? (totalHashes / elapsed) : 0;
    
    document.getElementById('hashrate').textContent = currentRate.toFixed(2);
    document.getElementById('accepted').textContent = accepted;
    document.getElementById('rejected').textContent = rejected;
    document.getElementById('total').textContent = Math.floor(totalHashes);
  }, 200);
}

// ==================== BOOT ====================
document.getElementById('startBtn').onclick = startMining;
document.getElementById('stopBtn').onclick = stopMining;

log('XMRig WASM UI loaded — waiting for module...', 'info');
loadWasm();
</script>
</body>
</html>
